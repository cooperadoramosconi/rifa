<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Rifa</title>

<style>
body { font-family: Arial; text-align:center; }
.btn-numero { padding:10px; margin:2px; }
.disponible{background:green;color:white;}
.pendiente{background:orange;}
.vendido{background:red;color:white;}
</style>

</head>

<body>

<h2>Gran Rifa</h2>

<div id="grid"></div>

<div id="form" style="display:none;">
<input id="nombre" placeholder="Nombre"><br>
<input id="dni" placeholder="DNI"><br>
<input id="direccion" placeholder="Dirección"><br>
<input id="celular" placeholder="Celular"><br>
<input id="email" placeholder="Email"><br>
<button onclick="enviar()">Reservar</button>
</div>

<script>

const URL_SCRIPT = https://script.google.com/macros/s/AKfycbyz8rTSeGolgszQbH0T1XyxkRMMctRdmaJoJW-k1kF80W4hAJI7X-odGF7BWgUHhJaE/exec;

let numeroSel = null;


// ================================
// CARGAR NUMEROS (JSONP)
// ================================
function cargarNumeros(data){
  let grid = document.getElementById("grid");

  data.forEach(f=>{
    let btn=document.createElement("button");
    btn.innerText=f[0];
    btn.className="btn-numero "+(f[1]||"Disponible").toLowerCase();

    if((f[1]||"Disponible")=="Disponible"){
      btn.onclick=()=>abrir(f[0]);
    }

    grid.appendChild(btn);
  });
}

let script = document.createElement("script");
script.src = URL_SCRIPT + "?accion=obtener&callback=cargarNumeros";
document.body.appendChild(script);


// ================================
function abrir(n){
  numeroSel=n;
  document.getElementById("form").style.display="block";
}


// ================================
function enviar(){

  let url = URL_SCRIPT + "?accion=reservar"
    + "&numero=" + numeroSel
    + "&nombre=" + encodeURIComponent(document.getElementById("nombre").value)
    + "&dni=" + encodeURIComponent(document.getElementById("dni").value)
    + "&direccion=" + encodeURIComponent(document.getElementById("direccion").value)
    + "&celular=" + encodeURIComponent(document.getElementById("celular").value)
    + "&email=" + encodeURIComponent(document.getElementById("email").value)
    + "&callback=procesarReserva";

  let s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

function procesarReserva(res){
  if(res.success){
    alert("Reserva OK");
    location.reload();
  } else {
    alert(res.message);
  }
}

</script>

</body>
</html>
